replicaCount: 1

image:
  repository: openclaw-gateway
  tag: latest
  pullPolicy: Always

service:
  port: 18789

ingress:
  enabled: true
  host: ""
  tls: false

env: {}
secretEnv: {}

resources:
  requests:
    memory: "512Mi"
    cpu: "200m"
  limits:
    memory: "4Gi"
    cpu: "2000m"

healthCheck:
  path: /health
  initialDelaySeconds: 60
  periodSeconds: 10

# ServiceAccount for kubectl access within the cluster
serviceAccount:
  create: true
  name: ""

# RBAC rules for the openclaw agent
rbac:
  create: true

# Namespace that OpenClaw manages (for RBAC scoping)
appNamespace: "app"

# Persistent workspace for cloned repos
workspace:
  enabled: true
  size: "50Gi"
  storageClass: ""
  mountPath: /workspace
