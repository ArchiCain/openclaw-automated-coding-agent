replicaCount: 1

image:
  repository: frontend
  tag: latest
  pullPolicy: IfNotPresent

service:
  port: 8080

ingress:
  enabled: true
  host: ""
  tls: false

env: {}

# API proxy through nginx (same-origin cookies, no cross-domain issues)
apiProxy:
  enabled: true
  backendService: "backend"
  backendPort: 8080

resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "200m"

healthCheck:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 10
