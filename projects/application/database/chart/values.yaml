image:
  repository: pgvector/pgvector
  tag: pg16
  pullPolicy: IfNotPresent

service:
  port: 5432

env: {}

persistence:
  enabled: true
  size: 10Gi
  storageClass: ""

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

healthCheck:
  initialDelaySeconds: 10
  periodSeconds: 5
