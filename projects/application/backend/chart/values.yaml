replicaCount: 1

image:
  repository: backend
  tag: latest
  pullPolicy: IfNotPresent

service:
  port: 8080

ingress:
  enabled: true
  host: ""
  tls: false

env: {}
secretEnv: {}

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

healthCheck:
  path: /health
  initialDelaySeconds: 30
  periodSeconds: 10
