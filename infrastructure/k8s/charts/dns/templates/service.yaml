apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
spec:
  type: NodePort
  ports:
    - port: 53
      targetPort: 53
      nodePort: {{ .Values.service.nodePort }}
      protocol: UDP
      name: dns-udp
    - port: 53
      targetPort: 53
      nodePort: {{ .Values.service.nodePort }}
      protocol: TCP
      name: dns-tcp
  selector:
    app: {{ .Release.Name }}
