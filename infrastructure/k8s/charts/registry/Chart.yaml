apiVersion: v2
name: registry
description: >
  In-cluster Docker registry. Used instead of ECR/GHCR because for a single-node
  K3s setup there is no practical benefit to a managed registry — the only consumer
  is on the same node. This eliminates external dependencies, avoids per-image costs,
  and keeps the deployment entirely self-contained. If multi-cluster or CI/CD from
  GitHub Actions is added later, swap to ECR/GHCR by changing the image repository
  env vars — no chart changes needed.
type: application
version: 0.1.0
appVersion: "2"
