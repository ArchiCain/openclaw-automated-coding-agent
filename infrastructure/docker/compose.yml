# Local development environment - hot reload, volume mounts, pgweb
# Usage: docker compose -f infrastructure/docker/compose.yml up -d
#   or:  task infra:docker:start

name: ${COMPOSE_PROJECT_NAME:-projects}

services:
  database:
    build:
      context: ../../projects/application/database
      dockerfile: dockerfiles/postgres.Dockerfile
    ports:
      - "${DATABASE_PORT}:5432"
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - database_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgweb:
    image: sosedoff/pgweb:latest
    ports:
      - "${PGWEB_PORT:-8082}:8081"
    environment:
      PGWEB_DATABASE_URL: postgres://${DATABASE_USERNAME}:${DATABASE_PASSWORD}@database:5432/${DATABASE_NAME}?sslmode=disable
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      database:
        condition: service_healthy

  backend:
    init: true
    platform: linux/amd64
    build:
      context: ../../projects/application/backend
      dockerfile: dockerfiles/local.Dockerfile
    ports:
      - "${BACKEND_PORT}:8080"
    env_file:
      - ../../.env
    environment:
      - NODE_ENV=development
      - PORT=8080
      - SERVICE_NAME=backend
      - DATABASE_PORT=5432
    volumes:
      - ../../projects/application/backend/app:/app
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:8080/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy

  backend-python:
    init: true
    platform: linux/amd64
    build:
      context: ../../projects/application/backend-python
      dockerfile: dockerfiles/local.Dockerfile
    ports:
      - "${BACKEND_PYTHON_PORT:-8086}:8080"
    env_file:
      - ../../.env
    environment:
      - PORT=8080
      - SERVICE_NAME=backend-python
    volumes:
      - ../../projects/application/backend-python/app:/app
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  keycloak:
    build:
      context: ../../projects/application/keycloak
      dockerfile: dockerfiles/Dockerfile
    ports:
      - "${KEYCLOAK_PORT}:8080"
    env_file:
      - ../../.env
    environment:
      - KC_DB_URL=jdbc:postgresql://database:5432/${DATABASE_NAME}?sslmode=disable
      - KC_DB_SCHEMA=keycloak
      - KC_DB_USERNAME=${DATABASE_USERNAME}
      - KC_DB_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_SSL=${DATABASE_SSL}
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      - KC_REALM=application
      - KC_CLIENT_ID=backend-service
      - FRONTEND_URL=http://localhost:${FRONTEND_PORT}
      - KC_LOG_LEVEL=INFO
      - KC_TRANSACTION_XA_ENABLED=false
      - KC_IMPORT_OVERWRITE=true
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy

  frontend:
    init: true
    platform: linux/amd64
    build:
      context: ../../projects/application/frontend
      dockerfile: dockerfiles/local.Dockerfile
    ports:
      - "${FRONTEND_PORT}:8080"
    env_file:
      - ../../.env
    environment:
      - NODE_ENV=development
      - PORT=8080
      - SERVICE_NAME=frontend
      - VITE_BACKEND_URL=http://localhost:${BACKEND_PORT}
    volumes:
      - ../../projects/application/frontend/app:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  openclaw-gateway:
    init: true
    build:
      context: ../../projects/openclaw
      dockerfile: dockerfiles/prod.Dockerfile
    ports:
      - "${OPENCLAW_PORT:-18789}:18789"
    env_file:
      - ../../.env
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - OPENCLAW_WEBHOOK_SECRET=${OPENCLAW_WEBHOOK_SECRET}
      - OPENCLAW_AUTH_TOKEN=${OPENCLAW_AUTH_TOKEN}
      - OPENCLAW_REPO_URL=https://github.com/sdcain-rts/automated-repo.git
      - OPENCLAW_ALLOWED_ORIGINS=http://localhost:${OPENCLAW_PORT:-18789}
      - OPENCLAW_ENV_NAME=${OPENCLAW_ENV_NAME:-local}
      - DEPLOY_BRANCH=${DEPLOY_BRANCH:-main}
      # Local dev: manual-only mode, no automated crons
      - OPENCLAW_CRON_ENABLED=${OPENCLAW_CRON_ENABLED:-false}
      # E2E testing URLs (Docker Compose service names)
      - E2E_FRONTEND_URL=http://frontend:8080
      - E2E_BACKEND_URL=http://backend:8080
      - E2E_KEYCLOAK_URL=http://keycloak:8080
    volumes:
      - openclaw_workspace:/workspace
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  docs:
    build:
      context: ../../projects/docs
      dockerfile: dockerfiles/local.Dockerfile
    ports:
      - "${DOCS_PORT:-8083}:8080"
    volumes:
      - ../../projects/docs/app:/app
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  database_data:
    driver: local
  openclaw_workspace:
    driver: local
